<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a0"/>
      <stop offset="30%" stop-color="#f0d875"/>
      <stop offset="60%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a67c00"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1a00"/>
      <stop offset="100%" stop-color="#1a0f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Back card -->
  <rect x="18" y="6" width="30" height="40" rx="3" fill="url(#card)" stroke="url(#gold)" stroke-width="1.5" transform="rotate(12, 33, 26)" opacity="0.7"/>
  <!-- Middle card -->
  <rect x="16" y="8" width="30" height="40" rx="3" fill="url(#card)" stroke="url(#gold)" stroke-width="1.5" transform="rotate(-6, 31, 28)" opacity="0.85"/>
  <!-- Front card -->
  <rect x="14" y="10" width="30" height="40" rx="3" fill="url(#card)" stroke="url(#gold)" stroke-width="2"/>
  <!-- Star ornament on front card -->
  <path d="M29 24 l2 5 5 0.5 -3.8 3.5 1.2 5.2 -4.4-2.8 -4.4 2.8 1.2-5.2 -3.8-3.5 5-0.5z" fill="url(#gold)" filter="url(#glow)"/>
  <!-- Bottom filigree line -->
  <line x1="10" y1="58" x2="54" y2="58" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="10" cy="58" r="1.5" fill="#f0d875" opacity="0.6"/>
  <circle cx="54" cy="58" r="1.5" fill="#f0d875" opacity="0.6"/>
  <circle cx="32" cy="58" r="1" fill="#ffe8a0" opacity="0.8"/>
</svg>
